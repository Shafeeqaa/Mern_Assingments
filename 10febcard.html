<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beautiful Card</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 320px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            text-align: center;
        }

        .card-content h2 {
            margin: 10px 0;
            font-weight: 600;
        }

        .card-content p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            color: white;
            border-radius: 25px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background: linear-gradient(135deg, #ff5c8a, #ff3d6d);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Beautiful Image">

        <div class="card-content">
            <h2>Explore Nature</h2>
            <p>Experience the beauty of nature with stunning landscapes and peaceful vibes.</p>
            <a href="#" class="btn">Discover</a>
        </div>
    </div>

</body>
</html>
